<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER TECH TEAM</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<style>
body{font-family:Arial;margin:0;background:#0a0a0a;color:#fff}
header{background:#111;padding:15px;display:flex;justify-content:space-between;align-items:center}
nav a{color:#00ff88;margin:0 10px;text-decoration:none}
.btn{background:#00ff88;color:#000;padding:8px 15px;border:none;border-radius:5px;cursor:pointer}
.card{background:#1a1a1a;margin:10px;padding:15px;border-radius:10px}
input,textarea{width:100%;padding:8px;margin:5px 0;background:#222;color:#fff;border:1px solid #333;border-radius:5px}
.hidden{display:none}
.lang-btn{cursor:pointer}
</style>
</head>
<body>

<header>
  <h2>CYBER TECH TEAM</h2>
  <nav>
    <a href="#home" data-sw="Nyumbani" data-en="Home">Nyumbani</a>
    <a href="#videos" data-sw="Video" data-en="Videos">Video</a>
    <a href="#gallery" data-sw="Picha" data-en="Gallery">Picha</a>
    <a href="#contact" data-sw="Wasiliana" data-en="Contact">Wasiliana</a>
    <span class="lang-btn" onclick="setLang('sw')">SW</span> |
    <span class="lang-btn" onclick="setLang('en')">EN</span>
    <button id="loginBtn" class="btn">Login</button>
    <button id="logoutBtn" class="btn hidden">Logout</button>
  </nav>
</header>

<!-- LOGIN MODAL -->
<div id="loginModal" class="hidden card" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999">
  <h3 data-sw="Ingia" data-en="Login">Ingia</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="pass" placeholder="Password">
  <button class="btn" onclick="login()">Login</button>
  <button class="btn" onclick="closeLogin()">Funga</button>
</div>

<!-- HOME -->
<section id="home" class="card">
  <h1 data-sw="Karibu CYBER TECH TEAM" data-en="Welcome to CYBER TECH TEAM">Karibu CYBER TECH TEAM</h1>
  <p data-sw="Tunatoa content bora za tech, tutorial na vitu vipya. Karibu sana!" data-en="We provide best tech content, tutorials and updates. Welcome!">Tunatoa content bora...</p>
  <div id="profilePic"></div>
</section>

<!-- ADMIN DASHBOARD - Inaonekana wewe tu -->
<section id="admin" class="card hidden">
  <h2>Admin Dashboard</h2>
  <h4>Upload Video</h4>
  <input type="text" id="vTitle" placeholder="Title ya Video">
  <textarea id="vDesc" placeholder="Maelezo marefu..."></textarea>
  <input type="file" id="vFile" accept="video/*">
  <input type="text" id="vLink" placeholder="Link yoyote - YouTube, Drive, nk">
  <button class="btn" onclick="uploadVideo()">Upload Video</button>

  <h4>Upload Picha</h4>
  <input type="text" id="iTitle" placeholder="Title ya Picha">
  <textarea id="iDesc" placeholder="Maelezo..."></textarea>
  <input type="file" id="iFile" accept="image/*">
  <button class="btn" onclick="uploadImage()">Upload Picha</button>
</section>

<!-- VIDEOS -->
<section id="videos">
  <h2 data-sw="Video Zetu" data-en="Our Videos">Video Zetu</h2>
  <div id="videoList"></div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <h2 data-sw="Gallery" data-en="Gallery">Gallery</h2>
  <div id="imageList"></div>
</section>

<!-- CONTACT -->
<section id="contact" class="card">
  <h2 data-sw="Wasiliana Nasi" data-en="Contact Us">Wasiliana Nasi</h2>
  <a href="https://whatsapp.com/channel/0029VbD4cs9545umLznrK62V" class="btn" target="_blank">Follow WhatsApp Channel</a>
  <a href="#" class="btn" target="_blank" style="background:#25D366">Join WhatsApp Group</a>
</section>

<script>
// Firebase Config yako
const firebaseConfig = {
  apiKey: "AIzaSyD9SvoHhndN-j-Sl59qcdcDwHwB22UupvU",
  authDomain: "nova-ec213.firebaseapp.com",
  projectId: "nova-ec213",
  storageBucket: "nova-ec213.firebasestorage.app",
  messagingSenderId: "978338235926",
  appId: "1:978338235926:web:6193ea73d8fcc8ded89737",
  measurementId: "G-211R5KP10J"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

let currentLang = 'sw';

// Lugha
function setLang(lang){
  currentLang = lang;
  document.querySelectorAll('[data-sw]').forEach(el=>{
    el.innerText = el.getAttribute('data-'+lang);
  })
}

// Auth
document.getElementById('loginBtn').onclick = ()=>document.getElementById('loginModal').classList.remove('hidden');
function closeLogin(){document.getElementById('loginModal').classList.add('hidden')}
function login(){
  auth.signInWithEmailAndPassword(email.value, pass.value)
 .then(u=>{
    if(u.user.email == 'mimi@gmail.com'){
      document.getElementById('admin').classList.remove('hidden');
    }
    closeLogin();
    loginBtn.classList.add('hidden');
    logoutBtn.classList.remove('hidden');
  }).catch(e=>alert(e.message))
}
logoutBtn.onclick = ()=>auth.signOut().then(()=>location.reload());

// Upload Video
function uploadVideo(){
  const file = vFile.files[0];
  const ref = storage.ref('videos/'+Date.now()+'_'+file.name);
  ref.put(file).then(snap=>snap.ref.getDownloadURL().then(url=>{
    db.ref('videos').push({
      title:vTitle.value, desc:vDesc.value, url:url, link:vLink.value, time:Date.now()
    });
    alert('Video imepanda!');
  }))
}

// Upload Image
function uploadImage(){
  const file = iFile.files[0];
  const ref = storage.ref('images/'+Date.now()+'_'+file.name);
  ref.put(file).then(snap=>snap.ref.getDownloadURL().then(url=>{
    db.ref('images').push({
      title:iTitle.value, desc:iDesc.value, url:url, time:Date.now()
    });
    alert('Picha imepanda!');
  }))
}

// Load Videos + Comments
db.ref('videos').on('value', snap=>{
  videoList.innerHTML = '';
  snap.forEach(child=>{
    const v = child.val();
    videoList.innerHTML += `
    <div class="card">
      <h3>${v.title}</h3>
      <video controls width="100%" src="${v.url}"></video>
      <p>${v.desc}</p>
      <a href="${v.link}" target="_blank" class="btn">Link Zaidi</a>
      <div id="c-${child.key}"></div>
      <input id="input-${child.key}" placeholder="Andika comment...">
      <button class="btn" onclick="comment('videos','${child.key}')">Tuma</button>
    </div>`;
    loadComments('videos', child.key);
  })
})

// Comment system
function comment(type,id){
  const text = document.getElementById('input-'+id).value;
  db.ref('comments/'+type+'/'+id).push({
    user:auth.currentUser.email, text:text, time:Date.now()
  });
}
function loadComments(type,id){
  db.ref('comments/'+type+'/'+id).on('value', snap=>{
    let html = '';
    snap.forEach(c=>{
      const data = c.val();
      html += `<p><b>${data.user}:</b> ${data.text}
      ${auth.currentUser?.email=='mimi@gmail.com'?`<button onclick="reply('${type}','${id}','${c.key}')">Jibu</button>`:''}</p>`;
    })
    document.getElementById('c-'+id).innerHTML = html;
  })
}
function reply(type,id,cid){
  const rep = prompt('Andika jibu lako:');
  db.ref('replies/'+type+'/'+id+'/'+cid).push({text:rep, time:Date.now()})
}

// Load Images
db.ref('images').on('value', snap=>{
  imageList.innerHTML = '';
  snap.forEach(child=>{
    const i = child.val();
    imageList.innerHTML += `<div class="card"><h3>${i.title}</h3><img src="${i.url}" width="100%"><p>${i.desc}</p></div>`;
  })
})
</script>
</body>
</html>
